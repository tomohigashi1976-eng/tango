<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>でる順パス単 1700 完全版</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --gray: #6c757d; --bg: #f8f9fa; --clear: #adb5bd; }
        body { font-family: -apple-system, sans-serif; text-align: center; background-color: var(--bg); margin: 0; padding: 15px; color: #333; touch-action: manipulation; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .active { display: block; }
        .setup-group { margin-bottom: 20px; text-align: left; background: #f1f3f5; padding: 15px; border-radius: 12px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #444; }
        .option-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .opt-btn { flex: 1; min-width: 100px; padding: 15px; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .opt-btn.selected { border-color: var(--primary); background: #e7f1ff; color: var(--primary); }
        .target-word { font-size: 3.2rem; font-weight: 800; color: var(--primary); margin: 25px 0; line-height: 1.2; word-break: break-word; }
        .input-area { margin: 20px 0; }
        .recognition-box { min-height: 100px; border: 2px dashed #ccc; border-radius: 12px; margin-bottom: 10px; padding: 15px; background: #fffcf0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #444; }
        .handwriting-input { width: 100%; height: 120px; padding: 15px; font-size: 2.5rem; border: 3px solid var(--primary); border-radius: 15px; text-align: center; outline: none; box-sizing: border-box; background: #fff; text-transform: lowercase; }
        .btn-clear { background: var(--clear); color: white; padding: 12px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .answer-display { font-size: 2.8rem; font-weight: bold; color: #d63384; margin: 20px 0; display: none; background: #fff0f6; padding: 20px; border-radius: 15px; border-left: 10px solid #d63384; word-break: break-all; line-height: 1.2; }
        button.main-btn { width: 100%; padding: 22px; font-size: 1.5rem; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-start { background: var(--primary); color: white; }
        .btn-show { background: var(--gray); color: white; }
        .btn-correct { background: var(--success); color: white; width: 48%; height: 100px; font-size: 1.8rem; }
        .btn-wrong { background: var(--danger); color: white; width: 48%; height: 100px; font-size: 1.8rem; }
        .btn-group { display: flex; justify-content: space-between; display: none; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen" class="screen active">
        <h1>英検特訓 1700語</h1>
        <div class="setup-group">
            <label>出題範囲 (1～1700)</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="range-start" value="1" min="1" max="1700" style="width:100%; padding:15px; font-size:1.2rem; border-radius:8px; border:1px solid #ccc;">
                <span style="align-self:center">～</span>
                <input type="number" id="range-end" value="1700" min="1" max="1700" style="width:100%; padding:15px; font-size:1.2rem; border-radius:8px; border:1px solid #ccc;">
            </div>
        </div>
        <div class="setup-group">
            <label>学習モード</label>
            <div class="option-group">
                <button class="opt-btn selected" id="m-en-jp" onclick="setMode('en-jp')">英 → 日</button>
                <button class="opt-btn" id="m-jp-en" onclick="setMode('jp-en')">日 → 英</button>
            </div>
        </div>
        <div class="setup-group">
            <label>順序 / 回答方法</label>
            <div class="option-group">
                <button class="opt-btn selected" id="o-asc" onclick="setOrder('asc')">番号順</button>
                <button class="opt-btn" id="o-rand" onclick="setOrder('rand')">ランダム</button>
            </div>
            <div class="option-group" style="margin-top:10px;">
                <button class="opt-btn selected" id="a-voice" onclick="setAnsMethod('voice')">音声認識</button>
                <button class="opt-btn" id="a-write" onclick="setAnsMethod('write')">手書き風入力</button>
            </div>
        </div>
        <button class="main-btn btn-start" onclick="startLesson()">特訓開始</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="progress-text" style="font-weight:bold; color:var(--gray);">1 / 1700</div>
        <div class="target-word" id="target-display">---</div>
        <div id="ui-voice" class="input-area">
            <div class="recognition-box" id="voice-output">（待機中）</div>
            <button class="btn-clear" onclick="clearInput()">クリア</button>
        </div>
        <div id="ui-write" class="input-area" style="display:none;">
            <input type="text" class="handwriting-input" id="text-answer" placeholder="ここに回答">
            <button class="btn-clear" onclick="clearInput()" style="margin-top:10px;">書き直し</button>
        </div>
        <button class="main-btn btn-show" id="show-answer-btn" onclick="revealAnswer()">回答を表示</button>
        <div class="answer-display" id="correct-answer">---</div>
        <div class="btn-group" id="judge-btns">
            <button class="btn-correct" onclick="processJudge(true)">〇 正解</button>
            <button class="btn-wrong" onclick="processJudge(false)">× 不正解</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1>特訓完了</h1>
        <p id="result-summary" style="white-space:pre-wrap; font-size:1.5rem; margin:30px 0;"></p>
        <button class="main-btn btn-start" id="retry-btn" onclick="startReview()" style="display:none;">間違えた単語を復習</button>
        <button class="main-btn btn-show" onclick="location.reload()">トップに戻る</button>
    </div>
</div>

<script>
    // 【データ貼り付けエリア】
    const rawData = ["let|させる","create|創造する","cause|引き起こす","increase|増やす,増える","leave|去る,残す","develop|発達させる","reduce|減らす","improve|改善する","produce|生産する","agree|同意する",
"tell|伝える,見分ける","allow|許す","prepare|準備する","own|所有する","check|点検する","suggest|提案する","cost|費用がかかる","meet|会う,満たす","provide|提供する","waste|浪費する",
"protect|保護する","offer|申し出る,提供する","describe|描写する","damage|損なう","disagree|反対する","recommend|勧める","repair|修理する","share|共有する","follow|従う,続く","lead|導く,率いる",
"attract|引き付ける","encourage|促す","support|支援する","raise|育てる,上げる","hire|雇う","charge|請求する,課す","care|気にかける","book|予約する","store|蓄える","train|訓練する",
"last|続く","park|駐車する","run|経営する,走る","plan|計画する","design|設計する","state|述べる","note|注意する,気づく","list|リストにする","mind|気にする","record|記録する",
"break|壊れる","force|強制する","pass|合格する,通り過ぎる","plant|植える","rest|休む","return|戻る","serve|役立つ,出す","stop|止まる","talk|話す","wait|待つ",
"wish|願う","act|行動する","add|加える","appear|現れる","apply|申し込む,適用する","arrive|到着する","ask|尋ねる,頼む","attack|攻撃する","attend|出席する","base|基づかせる",
"beat|打ち負かす","become|になる","begin|始まる","believe|信じる","belong|所属する","bite|噛む","blow|吹く","borrow|借りる","build|建てる","burn|燃える",
"buy|買う","call|呼ぶ","carry|運ぶ","catch|捕まえる","change|変える","choose|選ぶ","clean|掃除する","climb|登る","close|閉める","collect|集める",
"come|来る","compare|比較する","complain|不平を言う","complete|完成させる","consider|考える","continue|続ける","control|制御する","cook|料理する","copy|コピーする","count|数える",
"cover|覆う","cry|泣く","cut|切る","dance|踊る","decide|決める","deliver|配達する","die|死ぬ","dig|掘る","discuss|話し合う","divide|分ける",
"do|する","draw|描く","dream|夢を見る","drink|飲む","drive|運転する","drop|落とす","eat|食べる","end|終わる","enjoy|楽しむ","enter|入る",
"expect|期待する","explain|説明する","fail|失敗する","fall|落ちる","feel|感じる","fight|戦う","fill|満たす","find|見つける","finish|終える","fix|修理する",
"fly|飛ぶ","forget|忘れる","get|手に入れる","give|与える","go|行く","grow|成長する","guess|推測する","happen|起こる","hate|嫌う","have|持っている",
"hear|聞こえる","help|助ける","hide|隠す","hit|打つ","hold|持つ,開催する","hope|望む","hurry|急ぐ","hurt|傷つける","imagine|想像する","include|含む",
"introduce|紹介する","invite|招待する","join|加わる","jump|跳ぶ","keep|保つ","kick|蹴る","kill|殺す","knock|ノックする","know|知っている","laugh|笑う",
"lay|置く","learn|学ぶ","lend|貸す","let|させる","lie|横たわる,嘘をつく","light|火をつける,照らす","like|好む","listen|聴く","live|住む","look|見る",
"lose|失う","love|愛する","make|作る","manage|何とかやり遂げる,管理する","marry|結婚する","mean|意味する","measure|測る","miss|逃す,サボる","move|動く","name|名付ける",
"need|必要とする","notice|気づく","obey|従う","open|開ける","order|注文する","pay|支払う","pick|選ぶ,摘む","play|演奏する,遊ぶ","point|指し示す","post|投函する",
"practice|練習する","prefer|好む","prepare|準備する","press|押す","promise|約束する"
    ];

    const masterList = rawData.map(item => {
        const parts = item.split('|');
        return { en: parts[0], jp: parts[1] };
    });

    let currentList = [], wrongList = [], currentIndex = 0;
    let mode = 'en-jp', order = 'asc', ansMethod = 'voice', recognition;

    function setMode(m) { mode = m; updateOptBtns('m', m); }
    function setOrder(o) { order = o; updateOptBtns('o', o); }
    function setAnsMethod(a) { ansMethod = a; updateOptBtns('a', a); }
    function updateOptBtns(prefix, val) {
        document.querySelectorAll(`[id^="${prefix}-"]`).forEach(btn => btn.classList.remove('selected'));
        document.getElementById(`${prefix}-${val}`).classList.add('selected');
    }

    function initRecognition() {
        if (!('webkitSpeechRecognition' in window)) return;
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = (mode === 'jp-en') ? 'en-US' : 'ja-JP';
        recognition.onresult = (e) => {
            let t = '';
            for (let i = e.resultIndex; i < e.results.length; ++i) t += e.results[i][0].transcript;
            document.getElementById('voice-output').textContent = t.toLowerCase();
        };
    }

    function startLesson() {
        const s = Math.max(0, parseInt(document.getElementById('range-start').value) - 1);
        const e = Math.min(masterList.length, parseInt(document.getElementById('range-end').value));
        currentList = masterList.slice(s, e);
        if (order === 'rand') currentList.sort(() => Math.random() - 0.5);
        currentIndex = 0; wrongList = [];
        document.getElementById('ui-voice').style.display = (ansMethod === 'voice') ? 'block' : 'none';
        document.getElementById('ui-write').style.display = (ansMethod === 'write') ? 'block' : 'none';
        if (ansMethod === 'voice') initRecognition();
        showScreen('quiz-screen');
        nextQuestion();
    }

    function nextQuestion() {
        if (currentIndex >= currentList.length) return showResult();
        const q = currentList[currentIndex];
        document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${currentList.length}`;
        document.getElementById('target-display').textContent = (mode === 'en-jp') ? q.en : q.jp;
        document.getElementById('voice-output').textContent = "（待機中）";
        document.getElementById('text-answer').value = "";
        document.getElementById('correct-answer').style.display = 'none';
        document.getElementById('judge-btns').style.display = 'none';
        document.getElementById('show-answer-btn').style.display = 'block';
        if (ansMethod === 'voice' && recognition) try { recognition.start(); } catch (err) {}
    }

    function revealAnswer() {
        if (recognition) try { recognition.stop(); } catch(e) {}
        const q = currentList[currentIndex];
        const ansDiv = document.getElementById('correct-answer');
        ansDiv.textContent = (mode === 'en-jp') ? q.jp : q.en;
        ansDiv.style.display = 'block';
        document.getElementById('show-answer-btn').style.display = 'none';
        document.getElementById('judge-btns').style.display = 'flex';
        const uttr = new SpeechSynthesisUtterance(q.en);
        uttr.lang = 'en-US';
        window.speechSynthesis.speak(uttr);
    }

    function processJudge(ok) {
        if (!ok) wrongList.push(currentList[currentIndex]);
        currentIndex++;
        nextQuestion();
    }

    function showResult() {
        showScreen('result-screen');
        const score = currentList.length - wrongList.length;
        document.getElementById('result-summary').textContent = `全 ${currentList.length} 問中 ${score} 問正解！\n間違い: ${wrongList.length} 件`;
        document.getElementById('retry-btn').style.display = (wrongList.length > 0) ? 'block' : 'none';
    }

    function startReview() {
        currentList = [...wrongList]; wrongList = []; currentIndex = 0;
        showScreen('quiz-screen'); nextQuestion();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function clearInput() {
        document.getElementById('voice-output').textContent = "（待機中）";
        document.getElementById('text-answer').value = "";
        if (ansMethod === 'voice' && recognition) {
            try { recognition.stop(); } catch(e){}
            setTimeout(() => { try { recognition.start(); } catch(e){} }, 100);
        }
    }
</script>
</body>
</html>
