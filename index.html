<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>でる順パス単 特訓アプリ</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --gray: #6c757d; --bg: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; text-align: center; background-color: var(--bg); margin: 0; padding: 15px; color: #333; touch-action: manipulation; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .active { display: block; }
        .setup-group { margin-bottom: 20px; text-align: left; background: #f1f3f5; padding: 15px; border-radius: 12px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #444; }
        .option-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .opt-btn { flex: 1; padding: 15px; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .opt-btn.selected { border-color: var(--primary); background: #e7f1ff; color: var(--primary); }
        .target-word { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 25px 0; }
        .input-area { margin: 20px 0; }
        .handwriting-input { 
            width: 100%; height: 120px; padding: 15px; font-size: 2.5rem; 
            border: 3px solid var(--primary); border-radius: 15px; 
            text-align: center; outline: none; box-sizing: border-box; 
            background: #fff; text-transform: lowercase; 
        }
        .recognition-box { min-height: 100px; border: 2px dashed #ccc; border-radius: 12px; margin: 20px 0; padding: 15px; background: #fffcf0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #444; }
        .answer-display { font-size: 2.5rem; font-weight: bold; color: #333; margin: 20px 0; display: none; background: #e9ecef; padding: 20px; border-radius: 15px; border-left: 10px solid var(--primary); }
        button.main-btn { width: 100%; padding: 22px; font-size: 1.5rem; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-start { background: var(--primary); color: white; }
        .btn-show { background: var(--gray); color: white; }
        .btn-correct { background: var(--success); color: white; width: 48%; height: 100px; font-size: 1.8rem; }
        .btn-wrong { background: var(--danger); color: white; width: 48%; height: 100px; font-size: 1.8rem; }
        .btn-group { display: flex; justify-content: space-between; display: none; gap: 10px; }
        h1 { color: #444; margin-bottom: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen" class="screen active">
        <h1>でる順パス単</h1>
        <div class="setup-group">
            <label>学習モード</label>
            <div class="option-group">
                <button class="opt-btn selected" id="m-en-jp" onclick="setMode('en-jp')">英語 → 日本語</button>
                <button class="opt-btn" id="m-jp-en" onclick="setMode('jp-en')">日本語 → 英語</button>
            </div>
        </div>
        <div class="setup-group">
            <label>順序</label>
            <div class="option-group">
                <button class="opt-btn selected" id="o-asc" onclick="setOrder('asc')">順番どおり</button>
                <button class="opt-btn" id="o-rand" onclick="setOrder('rand')">ランダム</button>
            </div>
        </div>
        <div class="setup-group">
            <label>回答方法</label>
            <div class="option-group">
                <button class="opt-btn selected" id="a-voice" onclick="setAnsMethod('voice')">音声</button>
                <button class="opt-btn" id="a-write" onclick="setAnsMethod('write')">手書き</button>
                <button class="opt-btn" id="a-none" onclick="setAnsMethod('none')">表示のみ</button>
            </div>
        </div>
        <div class="setup-group">
            <label>出題範囲 (1-17)</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="range-start" value="1" style="width:100%; padding:15px; font-size:1.2rem; border-radius:8px; border:1px solid #ccc;">
                <span style="align-self:center">～</span>
                <input type="number" id="range-end" value="17" style="width:100%; padding:15px; font-size:1.2rem; border-radius:8px; border:1px solid #ccc;">
            </div>
        </div>
        <button class="main-btn btn-start" onclick="startLesson()">トレーニング開始</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="progress-text" style="font-weight:bold; color:var(--gray);">1 / 17</div>
        <div class="target-word" id="target-display">---</div>
        <div id="ui-voice" class="input-area"><div class="recognition-box" id="voice-output">（待機中）</div></div>
        <div id="ui-write" class="input-area" style="display:none;">
            <input type="text" class="handwriting-input" id="text-answer" placeholder="ここに書く" 
                   autocomplete="off" autocapitalize="none" spellcheck="false" oninput="this.value = this.value.toLowerCase()">
        </div>
        <button class="main-btn btn-show" id="show-answer-btn" onclick="revealAnswer()">回答を表示</button>
        <div class="answer-display" id="correct-answer">---</div>
        <div class="btn-group" id="judge-btns">
            <button class="btn-correct" onclick="processJudge(true)">〇 正解</button>
            <button class="btn-wrong" onclick="processJudge(false)">× 不正解</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1>特訓完了</h1>
        <p id="result-summary" style="white-space:pre-wrap; font-size:1.5rem; margin:30px 0;"></p>
        <button class="main-btn btn-start" id="retry-btn" onclick="startReview()" style="display:none;">間違いを復習</button>
        <button class="main-btn btn-show" onclick="location.reload()">設定に戻る</button>
    </div>
</div>

<script>
    const masterList = [
    {en:"let", jp:"～に…させる"},
    {en:"create", jp:"をつくり出す、を創造する"},
    {en:"cause", jp:"を引き起こす、の原因となる"},
    {en:"increase", jp:"増加する、を増やす"},
    {en:"leave", jp:"を…のままにしておく、を置き忘れる、を去る"},
    {en:"develop", jp:"を開発する、を発達させる、発展する"},
    {en:"reduce", jp:"を減らす、を小さくする"},
    {en:"improve", jp:"を進歩［向上］させる、良くなる"},
    {en:"produce", jp:"を作る、を引き起こす"},
    {en:"agree", jp:"意見が一致する、同意する"},
    {en:"tell", jp:"がわかる、を見分ける"},
    {en:"allow", jp:"を許す"},
    {en:"prepare", jp:"を準備する、を用意する"},
    {en:"own", jp:"を所有している"},
    {en:"check", jp:"を検査［点検］する、を阻止する"},
    {en:"suggest", jp:"を提案する、を示す"},
    {en:"cost", jp:"（費用）がかかる、を犠牲にさせる"},
    {en:"expect", jp:"を予想する、を期待する"},
    {en:"decide", jp:"を決める、に決着をつける"},
    {en:"provide", jp:"を供給する、を提供する"},
    {en:"continue", jp:"続く、を続ける"},
    {en:"include", jp:"を含んでいる、を込める"},
    {en:"remain", jp:"ままでいる、残る"},
    {en:"design", jp:"を設計する、を計画する"},
    {en:"control", jp:"を規制する、を統制する"},
    {en:"experience", jp:"を経験する、を味わう"},
    {en:"increase", jp:"を増やす、を増大させる"},
    {en:"mention", jp:"について述べる、に言及する"},
    {en:"offer", jp:"を提供する、を申し出る"},
    {en:"apply", jp:"申し込む、を適用する"},
    {en:"identify", jp:"を確認する、を特定する"},
    {en:"guess", jp:"を推測する、と思う"},
    {en:"deliver", jp:"を配達する、を渡す"},
    {en:"express", jp:"を表現する、を述べる"},
    {en:"appear", jp:"現れる、のように見える"},
    {en:"perform", jp:"を行う、を果たす"},
    {en:"finish", jp:"を終える、終わる"},
    {en:"happen", jp:"起こる、たまたま～する"},
    {en:"reach", jp:"に到着する、に達する"},
    {en:"suppose", jp:"と思う、を仮定する"},
    {en:"consider", jp:"を検討する、をよく考える"},
    {en:"discuss", jp:"について話し合う、を議論する"},
    {en:"receive", jp:"を受け取る、を受ける"},
    {en:"explain", jp:"を説明する、を明らかにする"},
    {en:"notice", jp:"に気づく、に注目する"},
    {en:"realize", jp:"を悟る、を実現する"},
    {en:"manage", jp:"を経営する、を何とか成し遂げる"},
    {en:"achieve", jp:"を達成する、を成し遂げる"},
    {en:"compare", jp:"を比較する、をたとえる"},
    {en:"refuse", jp:"を断る、を拒む"},
    {en:"order", jp:"を注文する、を命じる"},
    {en:"support", jp:"を支持する、を支える"},
    {en:"present", jp:"を贈る、を提示する"},
    {en:"charge", jp:"を請求する、を負わせる"},
    {en:"supply", jp:"を供給する、を与える"},
    {en:"describe", jp:"を述べる、を描写する"},
    {en:"contact", jp:"と連絡を取る、と接触する"},
    {en:"follow", jp:"に続く、に従う"},
    {en:"suppose", jp:"を仮定する、と思う"},
    {en:"contain", jp:"を含んでいる、を封じ込める"},
    {en:"measure", jp:"を測る、を見積もる"},
    {en:"publish", jp:"を出版する、を発表する"},
    {en:"spread", jp:"広がる、を広げる"},
    {en:"depend", jp:"依存する、次第である"},
    {en:"affect", jp:"に影響を与える、を感動させる"},
    {en:"demand", jp:"を要求する、を必要とする"},
    {en:"reserve", jp:"を予約する、をとっておく"},
    {en:"advertise", jp:"を宣伝する、を公告する"},
    {en:"establish", jp:"を設立する、を確立する"},
    {en:"recommend", jp:"を勧める、を推薦する"},
    {en:"promote", jp:"を促進する、を昇進させる"},
    {en:"fix", jp:"を修理する、を固定する"},
    {en:"solve", jp:"を解決する、を解く"},
    {en:"attract", jp:"を引きつける、を魅了する"},
    {en:"provide", jp:"に備える、を供給する"},
    {en:"celebrate", jp:"を祝う、を挙行する"},
    {en:"maintain", jp:"を維持する、を主張する"},
    {en:"examine", jp:"を調査する、を試験する"},
    {en:"identify", jp:"を同一視する、を確認する"},
    {en:"announce", jp:"を発表する、を告知する"},
    {en:"prefer", jp:"をより好む"},
    {en:"belong", jp:"属する、のものである"},
    {en:"attend", jp:"に出席する、の世話をする"},
    {en:"require", jp:"を必要とする、を要求する"},
    {en:"confirm", jp:"を確認する、を裏づける"},
    {en:"invite", jp:"を招待する、を求める"},
    {en:"avoid", jp:"を避ける、を回避する"},
    {en:"increase", jp:"増大する、を増やす"},
    {en:"participate", jp:"参加する"},
    {en:"remove", jp:"を取り除く、を解雇する"},
    {en:"separate", jp:"を分ける、を引き離す"},
    {en:"deliver", jp:"（講義など）をする、を配達する"},
    {en:"appreciate", jp:"を感謝する、を正しく評価する"},
    {en:"protect", jp:"を保護する、を守る"},
    {en:"waste", jp:"を浪費する、を無駄にする"},
    {en:"indicate", jp:"を示す、を指し示す"},
    {en:"replace", jp:"に取って代わる、を取り替える"},
    {en:"improve", jp:"良くなる、を進歩させる"},
    {en:"respect", jp:"を尊敬する、を尊重する"},
    {en:"disappoint", jp:"を失望させる、をがっかりさせる"}
];

    let currentList = [], wrongList = [], currentIndex = 0;
    let mode = 'en-jp', order = 'asc', ansMethod = 'voice', recognition;

    function setMode(m) {
        mode = m;
        document.getElementById('m-en-jp').classList.toggle('selected', m==='en-jp');
        document.getElementById('m-jp-en').classList.toggle('selected', m==='jp-en');
    }
    function setOrder(o) {
        order = o;
        document.getElementById('o-asc').classList.toggle('selected', o==='asc');
        document.getElementById('o-rand').classList.toggle('selected', o==='rand');
    }
    function setAnsMethod(a) {
        ansMethod = a;
        document.getElementById('a-voice').classList.toggle('selected', a==='voice');
        document.getElementById('a-write').classList.toggle('selected', a==='write');
        document.getElementById('a-none').classList.toggle('selected', a==='none');
    }

    function initRecognition() {
        if (!('webkitSpeechRecognition' in window)) return;
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = (mode === 'jp-en') ? 'en-US' : 'ja-JP';
        recognition.onresult = (e) => {
            let t = '';
            for (let i = e.resultIndex; i < e.results.length; ++i) t += e.results[i][0].transcript;
            document.getElementById('voice-output').textContent = t.toLowerCase();
        };
    }

    function startLesson() {
        const s = parseInt(document.getElementById('range-start').value)-1;
        const e = parseInt(document.getElementById('range-end').value);
        currentList = masterList.slice(s, e);
        if (order === 'rand') currentList.sort(()=>Math.random()-0.5);
        currentIndex = 0; wrongList = [];
        document.getElementById('ui-voice').style.display = (ansMethod==='voice') ? 'block' : 'none';
        document.getElementById('ui-write').style.display = (ansMethod==='write') ? 'block' : 'none';
        if (ansMethod==='voice') initRecognition();
        showScreen('quiz-screen');
        nextQuestion();
    }

    function nextQuestion() {
        if (currentIndex >= currentList.length) return showResult();
        const q = currentList[currentIndex];
        document.getElementById('progress-text').textContent = `${currentIndex+1} / ${currentList.length}`;
        document.getElementById('target-display').textContent = (mode==='en-jp') ? q.en : q.jp;
        document.getElementById('voice-output').textContent = "（待機中）";
        document.getElementById('text-answer').value = "";
        document.getElementById('correct-answer').style.display = 'none';
        document.getElementById('judge-btns').style.display = 'none';
        document.getElementById('show-answer-btn').style.display = 'block';
        if (ansMethod==='voice' && recognition) try { recognition.start(); } catch(err){}
        if (ansMethod==='write') setTimeout(() => document.getElementById('text-answer').focus(), 100);
    }

    function revealAnswer() {
        if (recognition) recognition.stop();
        const q = currentList[currentIndex];
        const ansDiv = document.getElementById('correct-answer');
        ansDiv.textContent = (mode==='en-jp') ? q.jp : q.en;
        ansDiv.style.display = 'block';
        document.getElementById('show-answer-btn').style.display = 'none';
        document.getElementById('judge-btns').style.display = 'flex';
        
        const uttr = new SpeechSynthesisUtterance(q.en);
        uttr.lang = 'en-US';
        uttr.rate = 0.8;   
        uttr.pitch = 1.15; 
        window.speechSynthesis.speak(uttr);
    }

    function processJudge(ok) {
        if (!ok) wrongList.push(currentList[currentIndex]);
        currentIndex++;
        nextQuestion();
    }

    function showResult() {
        showScreen('result-screen');
        document.getElementById('result-summary').textContent = `全工程が完了しました。\n今回の間違い: ${wrongList.length} 件`;
        document.getElementById('retry-btn').style.display = (wrongList.length>0) ? 'block' : 'none';
    }

    function startReview() {
        currentList = [...wrongList]; wrongList = []; currentIndex = 0;
        showScreen('quiz-screen'); nextQuestion();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
