<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>でる順パス単 1700特訓</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --gray: #6c757d; --bg: #f8f9fa; --clear: #adb5bd; }
        body { font-family: -apple-system, sans-serif; text-align: center; background-color: var(--bg); margin: 0; padding: 15px; color: #333; touch-action: manipulation; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .active { display: block; }
        .setup-group { margin-bottom: 20px; text-align: left; background: #f1f3f5; padding: 15px; border-radius: 12px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #444; }
        .option-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .opt-btn { flex: 1; min-width: 100px; padding: 15px; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .opt-btn.selected { border-color: var(--primary); background: #e7f1ff; color: var(--primary); }
        .target-word { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 25px 0; line-height: 1.2; }
        .input-area { margin: 20px 0; }
        .recognition-box { min-height: 100px; border: 2px dashed #ccc; border-radius: 12px; margin-bottom: 10px; padding: 15px; background: #fffcf0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #444; }
        .handwriting-input { width: 100%; height: 120px; padding: 15px; font-size: 2.5rem; border: 3px solid var(--primary); border-radius: 15px; text-align: center; outline: none; box-sizing: border-box; background: #fff; text-transform: lowercase; }
        .btn-clear { background: var(--clear); color: white; padding: 12px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .answer-display { font-size: 3.5rem; font-weight: bold; color: #d63384; margin: 20px 0; display: none; background: #fff0f6; padding: 20px; border-radius: 15px; border-left: 10px solid #d63384; word-break: break-all; line-height: 1.2; }
        button.main-btn { width: 100%; padding: 22px; font-size: 1.5rem; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-start { background: var(--primary); color: white; }
        .btn-show { background: var(--gray); color: white; }
        .btn-correct { background: var(--success); color: white; width: 48%; height: 100px; font-size: 1.8rem; }
        .btn-wrong { background: var(--danger); color: white; width: 48%; height: 100px; font-size: 1.8rem; }
        .btn-group { display: flex; justify-content: space-between; display: none; gap: 10px; }
        h1 { color: #444; margin-bottom: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen" class="screen active">
        <h1>でる順パス単 1700</h1>
        <div class="setup-group">
            <label>出題範囲を指定</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="range-start" value="1" style="width:100%; padding:15px; font-size:1.2rem; border-radius:8px; border:1px solid #ccc;">
                <span style="align-self:center">～</span>
                <input type="number" id="range-end" value="400" style="width:100%; padding:15px; font-size:1.2rem; border-radius:8px; border:1px solid #ccc;">
            </div>
            <p style="font-size:0.8rem; color:var(--gray); margin-top:10px;">※現在は1〜400番まで登録済み</p>
        </div>
        
        <div class="setup-group">
            <label>学習モード</label>
            <div class="option-group">
                <button class="opt-btn selected" id="m-en-jp" onclick="setMode('en-jp')">英語→日本語</button>
                <button class="opt-btn" id="m-jp-en" onclick="setMode('jp-en')">日本語→英語</button>
            </div>
        </div>

        <div class="setup-group">
            <label>順序 / 回答方法</label>
            <div class="option-group" style="margin-bottom:10px;">
                <button class="opt-btn selected" id="o-asc" onclick="setOrder('asc')">順番通り</button>
                <button class="opt-btn" id="o-rand" onclick="setOrder('rand')">ランダム</button>
            </div>
            <div class="option-group">
                <button class="opt-btn selected" id="a-voice" onclick="setAnsMethod('voice')">音声</button>
                <button class="opt-btn" id="a-write" onclick="setAnsMethod('write')">手書き</button>
            </div>
        </div>

        <button class="main-btn btn-start" onclick="startLesson()">特訓開始</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="progress-text" style="font-weight:bold; color:var(--gray);">1 / 100</div>
        <div class="target-word" id="target-display">---</div>
        <div id="ui-voice" class="input-area">
            <div class="recognition-box" id="voice-output">（待機中）</div>
            <button class="btn-clear" onclick="clearInput()">入力をクリア</button>
        </div>
        <div id="ui-write" class="input-area" style="display:none;">
            <input type="text" class="handwriting-input" id="text-answer" placeholder="ここに書く" oninput="this.value = this.value.toLowerCase()">
            <button class="btn-clear" onclick="clearInput()" style="margin-top:10px;">書き直し</button>
        </div>
        <button class="main-btn btn-show" id="show-answer-btn" onclick="revealAnswer()">回答を表示</button>
        <div class="answer-display" id="correct-answer">---</div>
        <div class="btn-group" id="judge-btns">
            <button class="btn-correct" onclick="processJudge(true)">〇 正解</button>
            <button class="btn-wrong" onclick="processJudge(false)">× 不正解</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1>特訓完了</h1>
        <p id="result-summary" style="white-space:pre-wrap; font-size:1.5rem; margin:30px 0;"></p>
        <button class="main-btn btn-start" id="retry-btn" onclick="startReview()" style="display:none;">間違いを復習</button>
        <button class="main-btn btn-show" onclick="location.reload()">設定に戻る</button>
    </div>
</div>

    let currentList = [], wrongList = [], currentIndex = 0;
    let mode = 'en-jp', order = 'asc', ansMethod = 'voice', recognition;

    function setMode(m) {
        mode = m;
        document.getElementById('m-en-jp').classList.toggle('selected', m==='en-jp');
        document.getElementById('m-jp-en').classList.toggle('selected', m==='jp-en');
    }
    function setOrder(o) {
        order = o;
        document.getElementById('o-asc').classList.toggle('selected', o==='asc');
        document.getElementById('o-rand').classList.toggle('selected', o==='rand');
    }
    function setAnsMethod(a) {
        ansMethod = a;
        document.getElementById('a-voice').classList.toggle('selected', a==='voice');
        document.getElementById('a-write').classList.toggle('selected', a==='write');
    }

    function initRecognition() {
        if (!('webkitSpeechRecognition' in window)) return;
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = (mode === 'jp-en') ? 'en-US' : 'ja-JP';
        recognition.onresult = (e) => {
            let t = '';
            for (let i = e.resultIndex; i < e.results.length; ++i) t += e.results[i][0].transcript;
            document.getElementById('voice-output').textContent = t.toLowerCase();
        };
    }

    function clearInput() {
        document.getElementById('voice-output').textContent = "（待機中）";
        const textIn = document.getElementById('text-answer');
        textIn.value = "";
        textIn.focus();
        if (ansMethod === 'voice' && recognition) {
            try { recognition.stop(); } catch(e){}
            setTimeout(() => { try { recognition.start(); } catch(e){} }, 100);
        }
    }

    function startLesson() {
        const s = parseInt(document.getElementById('range-start').value)-1;
        const e = parseInt(document.getElementById('range-end').value);
        currentList = masterList.slice(s, e);
        if (order === 'rand') currentList.sort(()=>Math.random()-0.5);
        currentIndex = 0; wrongList = [];
        document.getElementById('ui-voice').style.display = (ansMethod==='voice') ? 'block' : 'none';
        document.getElementById('ui-write').style.display = (ansMethod==='write') ? 'block' : 'none';
        if (ansMethod==='voice') initRecognition();
        showScreen('quiz-screen');
        nextQuestion();
    }

    function nextQuestion() {
        if (currentIndex >= currentList.length) return showResult();
        const q = currentList[currentIndex];
        document.getElementById('progress-text').textContent = `${currentIndex+1} / ${currentList.length}`;
        document.getElementById('target-display').textContent = (mode==='en-jp') ? q.en : q.jp;
        document.getElementById('voice-output').textContent = "（待機中）";
        document.getElementById('text-answer').value = "";
        document.getElementById('correct-answer').style.display = 'none';
        document.getElementById('judge-btns').style.display = 'none';
        document.getElementById('show-answer-btn').style.display = 'block';
        if (ansMethod==='voice' && recognition) try { recognition.start(); } catch(err){}
        if (ansMethod==='write') setTimeout(() => document.getElementById('text-answer').focus(), 100);
    }

    function revealAnswer() {
        if (recognition) recognition.stop();
        const q = currentList[currentIndex];
        const ansDiv = document.getElementById('correct-answer');
        ansDiv.textContent = (mode==='en-jp') ? q.jp : q.en;
        ansDiv.style.display = 'block';
        document.getElementById('show-answer-btn').style.display = 'none';
        document.getElementById('judge-btns').style.display = 'flex';
        
        const uttr = new SpeechSynthesisUtterance(q.en);
        uttr.lang = 'en-US';
        uttr.rate = 0.8;
        window.speechSynthesis.speak(uttr);
    }

    function processJudge(ok) {
        if (!ok) wrongList.push(currentList[currentIndex]);
        currentIndex++;
        nextQuestion();
    }

    function showResult() {
        showScreen('result-screen');
        document.getElementById('result-summary').textContent = `終了！\n間違い: ${wrongList.length} 件`;
        document.getElementById('retry-btn').style.display = (wrongList.length>0) ? 'block' : 'none';
    }

    function startReview() {
        currentList = [...wrongList]; wrongList = []; currentIndex = 0;
        showScreen('quiz-screen'); nextQuestion();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
